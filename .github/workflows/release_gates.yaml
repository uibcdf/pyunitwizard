name: Release Gates

on:
  workflow_dispatch:

concurrency:
  group: release-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests_and_contracts:
    name: Tests and Contracts (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup conda env
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: devtools/conda-envs/release_gates_env.yaml
          environment-name: release-gates
          condarc: |
            channels:
              - uibcdf
              - conda-forge
            channel_priority: strict
          create-args: >-
            python=${{ matrix.python-version }}

      - name: Install package
        shell: bash -l {0}
        run: |
          python -m pip install . --no-deps

      - name: Run API contract and integration smoke
        shell: bash -l {0}
        run: |
          pytest -q tests/test_api_layout.py tests/integration/test_ecosystem_smoke.py

      - name: Run full test suite
        shell: bash -l {0}
        run: |
          pytest -q tests

  packaging_smoke:
    name: Packaging Smoke (Python 3.13)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup conda env
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: devtools/conda-envs/release_gates_env.yaml
          environment-name: release-gates
          condarc: |
            channels:
              - uibcdf
              - conda-forge
            channel_priority: strict
          create-args: >-
            python=3.13

      - name: Build artifacts
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install wheel and import
        shell: bash -l {0}
        run: |
          python -m pip install dist/*.whl --no-deps
          python -c "import pyunitwizard; print(pyunitwizard.__version__)"

  docs_build:
    name: Docs Build (Python 3.13)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup conda env
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: devtools/conda-envs/docs_env.yaml
          environment-name: docs
          condarc: |
            channels:
              - uibcdf
              - conda-forge
            channel_priority: strict
          create-args: >-
            python=3.13

      - name: Install package
        shell: bash -l {0}
        run: |
          python -m pip install . --no-deps

      - name: Build docs
        shell: bash -l {0}
        run: |
          make -C docs html
